<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/*
 * ╔═══════════════════════════════════════════════╗
 * ║  MON RELEVÉ — v2.0                            ║
 * ║  Compteur report · PDF · Absences valorisées  ║
 * ╚═══════════════════════════════════════════════╝
 */
const VERSION = "2.0";
const REPORT_WEEK_CAP = 180; // ±3h en minutes
const REPORT_GLOBAL_CAP = 360; // ±6h en minutes
const MOTIFS_VALORISES = ["Congé payé","Férié"];
const MOTIFS_NEUTRES = ["Maladie","Sans solde","Autre"];
function objJour(ct){return ct==="CDI — 39h"?468:420;} // objectif journalier travaillé : 7h48 ou 7h
function absAffJour(ct){return ct==="CDI — 39h"?480:420;} // valorisation CYFAC : 8h ou 7h (PDF uniquement)
function calcReport(jours,contrat,cfg){
  const objM=(H_OBJ[contrat]||DEF_OBJ)*60;const dv=objJour(contrat);const dvAbs=absAffJour(contrat);
  let travaille=0,neutre=0,valorisePDF=0;
  jours.forEach(j=>{
    if(!j.absence){travaille+=cNet(j.arrivee,j.depart,cfg);}
    else{
      const mult=j.demiJournee?0.5:1;
      if(j.demiJournee){travaille+=cNet(j.arrivee,j.depart,cfg);}
      neutre+=Math.round(dv*mult);
      if(MOTIFS_VALORISES.includes(j.motif)){valorisePDF+=Math.round(dvAbs*mult);}
    }
  });
  const objAjuste=objM-neutre;const total=travaille;const ecart=total-objAjuste;
  return{travaille,valorise:0,neutre,objAjuste,total,ecart,valorisePDF};
}

// ── Constants ──
const TOAST_MS = 2000, DL_MS = 1000, MS_DAY = 864e5, DEF_OBJ = 35;
const D_PM_H = "10:00", D_PM_F = "10:15", D_PD_D = "12:30", D_PD_F = "13:15";
const JOURS = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi"];
const MOTIFS = ["Congé payé","Férié","Maladie","Sans solde","Autre"];
const CONTRATS = ["CDI — 35h","CDI — 39h"];
const H_OBJ = {"CDI — 35h":35,"CDI — 39h":39};
const MOIS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const MOIS_C = ["jan.","fév.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
const MOIS_U = ["JANVIER","FÉVRIER","MARS","AVRIL","MAI","JUIN","JUILLET","AOÛT","SEPTEMBRE","OCTOBRE","NOVEMBRE","DÉCEMBRE"];

// ── Palette ──
const P = {

  glassShadow:"0 8px 32px rgba(0,0,0,.22)", glassBlur:"blur(32px)",
  teal:"#2DD4A8", tealDim:"rgba(45,212,168,.12)", sky:"#38BDF8", blue:"#3B82F6",
  orange:"#FBBF24", red:"#EF4444", text:"#FFFFFF", sub:"rgba(255,255,255,.7)",
  muted:"rgba(255,255,255,.4)", dim:"rgba(255,255,255,.2)", border:"rgba(255,255,255,.08)"
};

// ── Icons ──

const IClock=({color=P.muted,size=22})=><svg width={size} height={size} viewBox="0 0 24 24" stroke={color} {...sp}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
const ICalX=({color=P.muted,size=22})=><svg width={size} height={size} viewBox="0 0 24 24" stroke={color} {...sp}><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="10" y1="14" x2="14" y2="18"/><line x1="14" y1="14" x2="10" y2="18"/></svg>;
const IChart=({color=P.muted,size=22})=><svg width={size} height={size} viewBox="0 0 24 24" stroke={color} {...sp}><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>;
const IDoc=({size=16})=><svg width={size} height={size} viewBox="0 0 24 24" stroke={P.muted} {...sp}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>;
const IGear=({size=20})=><svg width={size} height={size} viewBox="0 0 24 24" stroke={P.sub} {...sp}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
const ICheck=({size=14,color=P.teal})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;

// ── Helpers ──
function getSem(d=new Date()){d=new Date(d);d.setHours(0,0,0,0);d.setDate(d.getDate()+3-((d.getDay()+6)%7));const s1=new Date(d.getFullYear(),0,4);return{y:d.getFullYear(),n:1+Math.round(((d-s1)/MS_DAY-3+((s1.getDay()+6)%7))/7)};}
function getLun(d=new Date()){d=new Date(d);const j=d.getDay();d.setDate(d.getDate()-j+(j===0?-6:1));d.setHours(0,0,0,0);return d;}
function getLunCle(c){const[a,s]=[parseInt(c.split("-S")[0]),parseInt(c.split("-S")[1])];const j=new Date(a,0,4);const dj=j.getDay()||7;const l=new Date(j);l.setDate(j.getDate()-dj+1+(s-1)*7);l.setHours(0,0,0,0);return l;}
function cleS(s){return`${s.y}-S${String(s.n).padStart(2,"0")}`;}
function fU(d){return`${d.getDate()} ${MOIS_U[d.getMonth()]}`;}
function fC(d){return`${d.getDate()} ${MOIS_C[d.getMonth()]}`;}
function fF(d){return`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;}
function t2m(t){if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m;}
function m2h(m){if(m<=0)return"0h00";return`${Math.floor(m/60)}h${String(m%60).padStart(2,"0")}`;}
function cNet(a,d,cfg){if(!a||!d)return 0;const am=t2m(a),dm=t2m(d);if(dm<=am)return 0;let b=dm-am;const m1=t2m(cfg.pauseMatinHeure||D_PM_H),m2=t2m(cfg.pauseMatinFin||D_PM_F);if(m2>m1&&am<m2&&dm>m1)b-=(Math.min(dm,m2)-Math.max(am,m1));const p1=t2m(cfg.pauseMidiDebut||D_PD_D),p2=t2m(cfg.pauseMidiFin||D_PD_F);if(p2>p1&&am<p2&&dm>p1)b-=(Math.min(dm,p2)-Math.max(am,p1));return Math.max(0,b);}
function cPause(a,d,cfg){if(!a||!d)return 0;const am=t2m(a),dm=t2m(d);if(dm<=am)return 0;let p=0;const m1=t2m(cfg.pauseMatinHeure||D_PM_H),m2=t2m(cfg.pauseMatinFin||D_PM_F);if(m2>m1&&am<m2&&dm>m1)p+=(Math.min(dm,m2)-Math.max(am,m1));const p1=t2m(cfg.pauseMidiDebut||D_PD_D),p2=t2m(cfg.pauseMidiFin||D_PD_F);if(p2>p1&&am<p2&&dm>p1)p+=(Math.min(dm,p2)-Math.max(am,p1));return p;}
function tIdx(){const d=new Date().getDay();return d>=1&&d<=5?d-1:-1;}
function semOff(o){const d=new Date();d.setDate(d.getDate()+o*7);return{s:getSem(d),l:getLun(d)};}
function salut(){const h=new Date().getHours();return h<12?"Bonjour":h<18?"Bon après-midi":"Bonsoir";}
function hNow(){const d=new Date();return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}

// ── Storage ──
const PX="mr_";
const vide=s=>({cle:cleS(s),valide:false,valideA:null,notes:"",report:null,jours:Array.from({length:5},()=>({arrivee:"",depart:"",absence:false,motif:"",motifAutre:"",demiJournee:false}))});
function ldSem(c,n){try{const r=localStorage.getItem(`${PX}${n}_${c}`);if(r){const d=JSON.parse(r);return{cle:d.cle||d.key||c,valide:d.valide!==undefined?d.valide:!!d.v,valideA:d.valideA||d.at||null,notes:d.notes||"",report:d.report||null,jours:(d.jours||d.days||[]).map(j=>({arrivee:j.arrivee||j.a||"",depart:j.depart||j.d||"",absence:j.absence!==undefined?j.absence:!!j.abs,motif:j.motif||j.mot||"",motifAutre:j.motifAutre||j.motA||"",demiJournee:!!j.demiJournee}))};}}catch(e){console.warn(e);}return null;}
function svSem(c,n,d){try{localStorage.setItem(`${PX}${n}_${c}`,JSON.stringify(d));}catch(e){console.warn(e);}}
function delSem(c,n){try{localStorage.removeItem(`${PX}${n}_${c}`);}catch{}}
function ldCounter(){try{const v=localStorage.getItem(`${PX}report_counter`);return v?parseInt(v):0;}catch{return 0;}}
function svCounter(v){try{localStorage.setItem(`${PX}report_counter`,String(v));}catch{}}
function recalcCounter(n){
  const cfg=ldProf();
  const weeks=allSem(n).filter(w=>w.data&&w.data.valide).sort((a,b)=>a.cle.localeCompare(b.cle));
  let cnt=0;
  weeks.forEach(w=>{
    const rpt=calcReport(w.data.jours,cfg.contrat,cfg);
    const reportable=Math.max(-REPORT_WEEK_CAP,Math.min(REPORT_WEEK_CAP,rpt.ecart));
    const apres=Math.max(-REPORT_GLOBAL_CAP,Math.min(REPORT_GLOBAL_CAP,cnt+reportable));
    const applique=apres-cnt;
    w.data.report={avant:cnt,ecart:rpt.ecart,applique,apres,travaille:rpt.travaille,valorise:0,neutre:rpt.neutre,objAjuste:rpt.objAjuste,valoPDF:rpt.valorisePDF};
    svSem(w.cle,n,w.data);
    cnt=apres;
  });
  svCounter(cnt);
  return cnt;
}
function ldProf(){try{const r=localStorage.getItem(`${PX}prof`);if(r){const p=JSON.parse(r);const matH=p.pauseMatinHeure||D_PM_H;let matF=p.pauseMatinFin;if(!matF&&p.pauseMatinDuree!==undefined){const mf=t2m(matH)+p.pauseMatinDuree;matF=`${String(Math.floor(mf/60)).padStart(2,"0")}:${String(mf%60).padStart(2,"0")}`;}return{nom:p.nom||p.name||"",contrat:p.contrat||"",entreprise:p.entreprise||p.co||"",pointageRapide:p.pointageRapide!==undefined?p.pointageRapide:(p.quickStamp!==undefined?p.quickStamp:true),pauseMatinHeure:matH,pauseMatinFin:matF||D_PM_F,pauseMidiDebut:p.pauseMidiDebut||D_PD_D,pauseMidiFin:p.pauseMidiFin||D_PD_F};}}catch{}return{nom:"",contrat:"",entreprise:"",pointageRapide:true,pauseMatinHeure:D_PM_H,pauseMatinFin:D_PM_F,pauseMidiDebut:D_PD_D,pauseMidiFin:D_PD_F};}
function svProf(p){try{localStorage.setItem(`${PX}prof`,JSON.stringify(p));}catch{}}
function allSem(n){try{const pfx=`${PX}${n}_`;return Object.keys(localStorage).filter(k=>k.startsWith(pfx)).map(k=>{const c=k.slice(pfx.length);return{cle:c,data:ldSem(c,n)};}).filter(w=>w.data).sort((a,b)=>b.cle.localeCompare(a.cle));}catch{return[];}}
function mStats(n,ct,semNum,cfg){
  const now=new Date();const mo=now.getMonth(),yr=now.getFullYear();
  const dailyObj=((H_OBJ[ct]||DEF_OBJ)*60)/5;const dv=objJour(ct);
  const results=[];
  allSem(n).forEach(({cle,data})=>{
    const lun=getLunCle(cle);const num=parseInt(cle.split("-S")[1]);
    let daysIn=0,tot=0,absCount=0,neutreM=0;const absMotifs={};
    data.jours.forEach((j,i)=>{
      const day=new Date(lun);day.setDate(day.getDate()+i);
      if(day.getMonth()!==mo||day.getFullYear()!==yr)return;
      daysIn++;
      if(j.absence){
        const mult=j.demiJournee?0.5:1;absCount+=mult;
        const m=j.motif==="Autre"?(j.motifAutre||"Autre"):(j.motif||"Non précisé");absMotifs[m]=(absMotifs[m]||0)+mult;
        if(j.demiJournee){tot+=cNet(j.arrivee,j.depart,cfg);}
        neutreM+=Math.round(dv*mult);
      }else{tot+=cNet(j.arrivee,j.depart,cfg);}
    });
    if(daysIn===0)return;
    const obj=Math.round(daysIn*dailyObj)-neutreM;
    results.push({num,tot,obj,diff:tot-obj,v:!!data.valide,cur:num===semNum,absCount,absMotifs,daysIn});
  });
  return results.sort((a,b)=>a.num-b.num);
}

// ── Time history (frequent times) ──
function ldHist(){try{const r=localStorage.getItem(`${PX}thist`);return r?JSON.parse(r):[];}catch{return[];}}
function svHist(arr){try{localStorage.setItem(`${PX}thist`,JSON.stringify(arr.slice(0,8)));}catch{}}
function addHist(t){if(!t)return;const arr=ldHist();const idx=arr.findIndex(x=>x.t===t);if(idx>=0){arr[idx].c++;arr[idx].u=Date.now();}else{arr.push({t,c:1,u:Date.now()});}arr.sort((a,b)=>b.c-a.c||b.u-a.u);svHist(arr);}
function getHist(){return ldHist().slice(0,6).map(x=>x.t);}

// ── TimeInput Component ──
function TimeInput({value,onChange,label,noHistory}){
  const[focused,setFocused]=useState(false);
  const[raw,setRaw]=useState("");
  const[err,setErr]=useState(false);
  const inputRef=useRef(null);
  const hist=useMemo(()=>noHistory?[]:getHist(),[focused,noHistory]);
  
  const parseDigits=d=>{
    if(!d)return"";
    let h,m;
    if(d.length<=2){h=parseInt(d);m=0;}
    else if(d.length===3){h=parseInt(d[0]);m=parseInt(d.slice(1));}
    else{h=parseInt(d.slice(0,2));m=parseInt(d.slice(2));}
    if(isNaN(h)||isNaN(m)||h>23||m>59)return null;
    return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
  };
  
  const commit=()=>{
    setFocused(false);setErr(false);
    if(!raw){if(value)onChange("");return;}
    const digits=raw.replace(/\D/g,"");
    const parsed=parseDigits(digits);
    if(parsed===null){setErr(true);setTimeout(()=>setErr(false),TOAST_MS);return;}
    if(parsed){onChange(parsed);if(!noHistory)addHist(parsed);}
  };
  const handleFocus=()=>{setFocused(true);setErr(false);setRaw(value?value.replace(":",""):"");setTimeout(()=>{if(inputRef.current)inputRef.current.select();},50);};
  const handleBlur=()=>commit();
  const handleChange=e=>{setRaw(e.target.value.replace(/\D/g,"").slice(0,4));setErr(false);};
  const handleKeyDown=e=>{if(e.key==="Enter")e.target.blur();};
  const clear=()=>{onChange("");setRaw("");setFocused(false);};
  const pickHist=t=>{onChange(t);if(!noHistory)addHist(t);setRaw(t.replace(":",""));setFocused(false);};
  
  const displayVal=focused?raw:(value||"–:–");
  const hasVal=!!value;
  
  return(
    <div style={{position:"relative"}}>
      {label&&<div style={st.iL}>{label}</div>}
      <div style={{position:"relative",display:"flex",alignItems:"center"}}>
        <input ref={inputRef} type="text" inputMode="numeric" value={displayVal}
          onFocus={handleFocus} onBlur={handleBlur} onChange={handleChange} onKeyDown={handleKeyDown}
          style={{...st.tI,color:hasVal?P.text:P.dim,fontVariantNumeric:"tabular-nums",paddingRight:hasVal&&focused?32:12,...(err?{borderColor:P.red}:{})}}
        />
        {hasVal&&focused&&<button onMouseDown={e=>{e.preventDefault();clear();}} style={st.clrBtn} aria-label="Effacer">✕</button>}
      </div>
      {err&&<div style={{fontSize:10,color:P.red,marginTop:3}}>Heure invalide</div>}
      {focused&&hist.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
          {hist.map(t=><button key={t} onMouseDown={e=>{e.preventDefault();pickHist(t);}} style={st.chip}>{t}</button>)}
        </div>
      )}
    </div>
  );
}

// ── Main App ──
window.MonReleve=function MonReleve(){
  const[pr,setPr]=useState(ldProf);
  const[ok,setOk]=useState(()=>{const p=ldProf();return!!(p.nom&&p.entreprise);});
  const[ed,setEd]=useState(false);
  const[off,setOff]=useState(0);
  const[wd,setWd]=useState(null);
  const[tab,setTab]=useState("heures");
  const[msg,setMsg]=useState("");
  const[pop,setPop]=useState(false);
  const[arch,setArch]=useState(null);
  const[cfDel,setCfDel]=useState(false);
  const[cfUnlock,setCfUnlock]=useState(false);
  const[rk,setRk]=useState(0);
  const[peOpen,setPeOpen]=useState(false);
  const[notesOpen,setNotesOpen]=useState(false);
  const[detailMois,setDetailMois]=useState(false);
  const[relOpen,setRelOpen]=useState(false);
  const[aideOpen,setAideOpen]=useState(false);
  const[aideSec,setAideSec]=useState({});
  const toggleAide=id=>setAideSec(s=>({...s,[id]:!s[id]}));
  const[privOpen,setPrivOpen]=useState(false);
  const[savOpen,setSavOpen]=useState(false);
  const[pdfMois,setPdfMois]=useState(null);
  const[lastBackup,setLastBackup]=useState(()=>{try{return localStorage.getItem(`${PX}last_backup`)||null;}catch{return null;}});

  const{s:sem,l:lun}=semOff(off);
  const ck=cleS(sem),ven=new Date(lun.getTime()+4*MS_DAY),cur=off===0,ti=tIdx();
  const isWeekend=ti<0&&cur;

  useEffect(()=>{if(ok&&pr.nom)setWd(ldSem(ck,pr.nom)||vide(sem));},[ck,pr.nom,ok,rk,sem.n,sem.y]);
  // Recalcule le compteur au chargement
  useEffect(()=>{if(ok&&pr.nom)recalcCounter(pr.nom);},[ok,pr.nom]);

  const exporter=async()=>{
    const contenu=JSON.stringify({version:VERSION,profile:ldProf(),weeks:allSem(pr.nom),at:new Date().toISOString()},null,2);

    const a=document.createElement("a");const url=URL.createObjectURL(blob);a.href=url;a.download=nomFichier;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),DL_MS);enrDate();flash("Sauvegarde ✓");
  };
  const restaurer=()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json,application/json";inp.style.cssText="position:fixed;top:-9999px;left:-9999px;opacity:0";document.body.appendChild(inp);inp.onchange=e=>{const f=e.target.files[0];if(!f){document.body.removeChild(inp);return;}const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d||typeof d!=="object"||!d.profile||typeof d.profile!=="object"||!Array.isArray(d.weeks))throw new Error("!");const pn=d.profile.nom||d.profile.name;if(!pn||typeof pn!=="string"||!pn.trim())throw new Error("!");const p={nom:pn.trim(),contrat:d.profile.contrat||"",entreprise:(d.profile.entreprise||d.profile.co||"").trim(),pointageRapide:d.profile.pointageRapide!==undefined?d.profile.pointageRapide:true,pauseMatinHeure:d.profile.pauseMatinHeure||D_PM_H,pauseMatinFin:d.profile.pauseMatinFin||D_PM_F,pauseMidiDebut:d.profile.pauseMidiDebut||D_PD_D,pauseMidiFin:d.profile.pauseMidiFin||D_PD_F};svProf(p);let imported=0;d.weeks.forEach(w=>{if(!w||typeof w!=="object")return;const c=w.cle||w.key;if(!c||typeof c!=="string"||!w.data)return;svSem(c,p.nom,w.data);imported++;});setPr(p);setOk(true);setRk(x=>x+1);recalcCounter(p.nom);flash(`Restauré ✓ (${imported} sem.)`)}catch{flash("Fichier invalide");}document.body.removeChild(inp);};r.onerror=()=>{flash("Erreur de lecture");document.body.removeChild(inp);};r.readAsText(f);};setTimeout(()=>inp.click(),100);};

      {data.notes&&<div style={{fontSize:10,color:pk.text,marginTop:10,padding:"8px 10px",background:"#F9FAFB",borderRadius:8,border:`1px solid ${pk.border}`}}><strong>Note :</strong> {data.notes}</div>}
      <div style={{fontSize:9,color:pk.muted,marginTop:8}}>Pauses : {pr.pauseMatinHeure||D_PM_H}–{pr.pauseMatinFin||D_PM_F} + {pr.pauseMidiDebut||D_PD_D}–{pr.pauseMidiFin||D_PD_F}</div>

        </div>

          <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderTop:`2px solid #1E40AF`,marginTop:4,background:"#EFF6FF",margin:"4px -14px 0",padding:"8px 14px",borderRadius:"0 0 6px 6px"}}><span style={{fontSize:12,fontWeight:800,color:"#1E40AF"}}>Compteur actuel</span><span style={{fontSize:15,fontWeight:800,color:"#1E40AF"}}>{data.report.apres>0?"+":data.report.apres<0?"−":""}{m2h(Math.abs(data.report.apres))}</span></div>
        </div>

      </div>}

      <div style={{display:"flex",gap:14,marginTop:20}}><div style={{flex:1,border:`1px solid ${pk.border}`,borderRadius:10,padding:12,minHeight:50}}><div style={{fontSize:8,color:pk.muted,textTransform:"uppercase",letterSpacing:.5}}>Signature salarié</div></div><div style={{flex:1,border:`1px solid ${pk.border}`,borderRadius:10,padding:12,minHeight:50}}><div style={{fontSize:8,color:pk.muted,textTransform:"uppercase",letterSpacing:.5}}>Signature responsable</div></div></div>
      <div style={{fontSize:8,color:pk.muted,marginTop:10,textAlign:"right"}}>Mon Relevé v{VERSION}</div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:14,borderTop:`1px solid ${P.border}`}}>
          <div><div style={{fontSize:13,fontWeight:600,color:P.text}}>Pointage rapide</div><div style={{fontSize:11,color:P.sub,marginTop:2}}>Arrivée / Départ du jour</div></div>

  // ── Archive detail ──
  if(arch){const al=getLunCle(arch.cle);const av=new Date(al.getTime()+4*MS_DAY);const chevalArch=al.getMonth()!==av.getMonth()||al.getFullYear()!==av.getFullYear();const ma1={m:al.getMonth(),y:al.getFullYear()};const ma2={m:av.getMonth(),y:av.getFullYear()};return(

  // ── Main ──
  return(
    <div style={st.app}>

              {wd.valide?
                <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:6,alignItems:"center",marginTop:6}}>

            </div>)}

                  <span style={{fontSize:11,color:P.sub,textTransform:"uppercase",letterSpacing:.5,fontWeight:600}}>Compteur de report</span>

              <div style={{fontSize:9,color:P.dim,marginTop:4,textAlign:"center"}}>Plafond hebdo : ±{m2h(REPORT_WEEK_CAP)} · Plafond cumulé : ±{m2h(REPORT_GLOBAL_CAP)}</div>
            </div>
          );})()}

          {/* Mois en cours (toujours visible) */}
          <div style={{...GL,borderRadius:20,padding:"14px 18px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
              <span style={{fontSize:12,fontWeight:700,color:P.text,textTransform:"uppercase",letterSpacing:.5}}>{MOIS[new Date().getMonth()]}</span>
              {stats.length>0&&<div style={{fontSize:15,fontWeight:800,color:mDiff>0?P.teal:mDiff<0?P.orange:P.teal}}>{mDiff>0?`+${m2h(mDiff)}`:mDiff<0?`−${m2h(Math.abs(mDiff))}`:"À jour"}</div>}
            </div>
            {stats.length>0&&<div style={{fontSize:10,color:mDiff>0?P.teal:mDiff<0?P.orange:P.teal,marginBottom:8,fontWeight:500}}>{mDiff>0?"d'avance":mDiff<0?"restantes":""}</div>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
              <div style={{fontSize:14,fontWeight:600,color:P.sub}}>{m2h(mTot)} <span style={{fontWeight:400,color:P.muted}}>/ {m2h(mObj)}</span></div>
              {stats.length>0&&<button onClick={()=>setDetailMois(!detailMois)} style={{background:"none",border:"none",cursor:"pointer",color:P.teal,fontSize:11,fontWeight:600,padding:"4px 0"}}>Détail {detailMois?"▴":"›"}</button>}
            </div>
            <div style={{marginTop:6,height:4,borderRadius:2,background:"rgba(255,255,255,.06)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,background:mPct>=100?P.teal:P.blue,width:`${mPct}%`,transition:"width .4s ease"}}/></div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}><span style={{fontSize:9,color:P.dim}}>{mPct}%</span><span style={{fontSize:9,color:P.dim}}>{mDays}j ouvrés</span></div>
            {mAbsTotal>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>{mAbsDetail.map(([motif,count])=>(<div key={motif} style={{fontSize:9,color:P.orange,background:"rgba(251,191,36,.06)",padding:"2px 7px",borderRadius:999}}>{count%1===0.5?(count===0.5?"½":(count-0.5)+"½"):count}j {motif}</div>))}</div>}

          </div>

          <div style={{...GL,borderRadius:20,padding:"14px 18px",marginBottom:10}}>
            <button onClick={()=>setRelOpen(!relOpen)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",padding:0,WebkitTapHighlightColor:"transparent"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}><IDoc size={16}/><span style={{fontSize:13,fontWeight:700,color:P.text}}>Derniers relevés</span></div>
              <span style={{color:P.sub,fontSize:14,transform:relOpen?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
            </button>
            {relOpen&&<div style={{marginTop:12}}>
              {archList.length===0&&<div style={{color:P.muted,fontSize:12,textAlign:"center",padding:12}}>Aucun relevé</div>}
              {archList.slice(0,3).map(({cle:c,data:d})=>{
                const wt=d.jours.reduce((s,j)=>j.absence?s:s+cNet(j.arrivee,j.depart,pr),0);

                  <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                    <span style={{fontSize:11,fontWeight:700,color:P.teal,minWidth:28}}>S{parseInt(c.split("-S")[1])}</span>
                    <span style={{fontSize:11,color:P.sub}}>{fC(al)} – {fC(av)}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:13,fontWeight:700,color:P.text}}>{m2h(wt)}</span>
                    {d.valide&&<ICheck size={10}/>}
                  </div>
                </button>);
              })}
              {archList.length>3&&<div style={{textAlign:"center",paddingTop:6}}>
                {archList.slice(3).map(({cle:c,data:d})=>{
                  const wt=d.jours.reduce((s,j)=>j.absence?s:s+cNet(j.arrivee,j.depart,pr),0);
                  const al=getLunCle(c);const av=new Date(al.getTime()+4*MS_DAY);
                  return(<button key={c} onClick={()=>setArch({cle:c,data:d})} style={{...st.archI,marginBottom:6}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                      <span style={{fontSize:11,fontWeight:700,color:P.teal,minWidth:28}}>S{parseInt(c.split("-S")[1])}</span>
                      <span style={{fontSize:11,color:P.sub}}>{fC(al)} – {fC(av)}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:13,fontWeight:700,color:P.text}}>{m2h(wt)}</span>
                      {d.valide&&<ICheck size={10}/>}
                    </div>
                  </button>);
                })}
              </div>}
            </div>}
          </div>

          {/* Aide & Notice (sections repliables indépendantes) */}
          <div style={{...GL,borderRadius:20,padding:"14px 18px",marginBottom:10}}>
            <button onClick={()=>setAideOpen(!aideOpen)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",padding:0,WebkitTapHighlightColor:"transparent"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={P.teal} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <span style={{fontSize:13,fontWeight:700,color:P.text}}>Aide & Notice</span>
              </div>
              <span style={{color:P.sub,fontSize:14,transform:aideOpen?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
            </button>
            {aideOpen&&<div style={{marginTop:10}}>
              {[
                {id:"usage",t:"Utilisation",c:<>
                  <div style={{marginBottom:4}}>Chaque jour, saisissez votre heure d'arrivée et de départ. Tapez les chiffres directement (ex: 830 → 08:30, 1730 → 17:30).</div>
                  <div style={{marginBottom:4}}>Le pointage rapide permet d'enregistrer l'heure exacte en un tap (boutons ↓ et ↑). Les pauses sont déduites automatiquement.</div>
                  <div style={{marginBottom:4,fontWeight:600,color:P.text,marginTop:6}}>Validation</div>
                  <div style={{marginBottom:4}}>En fin de semaine, vérifiez vos heures puis tapez "Valider et envoyer".</div>
                  <div style={{color:P.orange,fontWeight:600}}>Seul le relevé validé et transmis à l'employeur fait foi.</div>
                </>},
                {id:"abs",t:"Absences",c:<>
                  <div style={{marginBottom:6}}>Déclarer chaque jour d'absence avec le motif. Choisir entre journée complète ou demi-journée.</div>
                  <div style={{marginBottom:4,padding:"8px 10px",borderRadius:10,background:P.tealDim}}>
                    <span style={{fontWeight:600,color:P.teal}}>Fonctionnement</span><br/>
                    <span style={{fontSize:11}}>Toutes les absences réduisent l'objectif de la semaine. Seules les heures réellement travaillées sont comptabilisées.</span></div>
                  <div style={{marginBottom:4,padding:"8px 10px",borderRadius:10,background:"rgba(255,255,255,.04)"}}>
                    <span style={{fontWeight:600,color:P.muted}}>Valorisation CYFAC (PDF uniquement)</span><br/>
                    <span style={{fontSize:11}}>CP et Férié : 8h / 4h (39h) · 7h / 3h30 (35h). Mentionné sur le relevé PDF à titre informatif pour la comptabilité.</span></div>
                </>},
                {id:"cpt",t:"Compteur de report",c:<>
                  <div style={{marginBottom:4}}>L'écart entre vos heures comptabilisées et l'objectif est reporté automatiquement d'une semaine à l'autre.</div>
                  <div style={{marginBottom:4}}>Plafonds : ±3h par semaine, ±6h en cumul.</div>
                  <div style={{marginBottom:4,padding:"8px 10px",borderRadius:10,background:"rgba(255,255,255,.04)",fontSize:11}}>
                    <strong>Exemple :</strong> Semaine à 41h sur contrat 39h → écart +2h → compteur passe de 0 à +2h.</div>
                  <div>Le compteur est recalculé automatiquement en cas de modification ou suppression d'un relevé.</div>
                </>},
                {id:"sav",t:"Sauvegarde & PDF",c:<>
                  <div style={{marginBottom:4}}>Effectuez une sauvegarde au minimum 1 fois par mois depuis le tableau de bord. Conservez le fichier dans iCloud Drive (iPhone) ou Google Drive (Android).</div>
                  <div style={{marginBottom:4}}>Le PDF contient : heures travaillées, absences valorisées, total comptabilisé, objectif ajusté, et le compteur de report.</div>
                  <div>Les statistiques mensuelles répartissent automatiquement les jours des semaines à cheval dans le mois concerné.</div>
                </>},
                {id:"priv",t:"Confidentialité",c:<>
                  <div style={{marginBottom:4}}>Vos données sont stockées exclusivement sur votre appareil. Aucune donnée n'est transmise à un serveur distant. Aucun compte utilisateur, aucun cookie, aucune collecte analytique.</div>
                  <div style={{marginBottom:4}}>Le motif "Maladie" (donnée de santé, art. 9 RGPD) est traité sur base légale (obligation de suivi du temps de travail). Seul le motif générique est enregistré.</div>
                  <div><button onClick={()=>setPrivOpen(true)} style={{background:"none",border:"none",color:P.teal,fontSize:12,fontWeight:600,cursor:"pointer",padding:0}}>Voir la notice complète ›</button></div>

                {id:"new",t:"Nouveautés V2",c:<>

                    <div key={i} style={{display:"flex",gap:6,alignItems:"center",lineHeight:1.6}}><span style={{color:P.teal,flexShrink:0}}>✓</span><span>{item}</span></div>

                    <span style={{fontSize:12,fontWeight:600,color:aideSec[s.id]?P.teal:P.sub}}>{s.t}</span>

                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>Stockage</div>
                <div style={{marginBottom:4}}>Toutes vos données sont stockées exclusivement sur votre appareil (localStorage du navigateur). Aucune donnée n'est transmise à un serveur distant.</div>
                <div style={{marginBottom:12,padding:"8px 10px",borderRadius:10,background:"rgba(255,255,255,.04)",fontSize:11}}>
                  <strong>Concrètement :</strong> aucun compte utilisateur, aucune base de données en ligne, aucun cookie de suivi, aucune collecte analytique.</div>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>Transmission</div>
                <div style={{marginBottom:12}}>Le relevé PDF est généré localement et partagé manuellement par le salarié à la direction, conformément à l'obligation de contrôle de la durée du travail.</div>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>Données de santé</div>
                <div style={{marginBottom:12}}>Le motif "Maladie" constitue une donnée de santé au sens de l'article 9 du RGPD. Son traitement est justifié par l'obligation légale de suivi du temps de travail. Seul le motif générique est enregistré, sans indication sur la nature de la pathologie.</div>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>Connexions réseau</div>
                <div style={{marginBottom:12}}>Au chargement initial, l'application contacte GitHub Pages (hébergement) et unpkg.com (bibliothèques techniques). Ces services peuvent enregistrer votre adresse IP. Une fois en cache, l'application fonctionne hors ligne.</div>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>Vos droits</div>
                <div style={{marginBottom:12}}>Conformément au RGPD, vous disposez d'un droit d'accès, de rectification et de suppression de vos données. Vos données étant stockées sur votre appareil, vous pouvez les consulter (export JSON), les modifier ou les supprimer à tout moment directement depuis l'application.</div>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>Durée de conservation</div>
                <div style={{marginBottom:4}}>Les données sont conservées sur votre appareil tant que vous ne les supprimez pas. Il est recommandé de conserver les relevés au minimum 3 ans (prescription légale en matière de durée du travail, art. L.3245-1 du Code du travail).</div>
              </div>
              <button onClick={()=>setPrivOpen(false)} style={{...st.sec,width:"100%",marginTop:16}}>Fermer</button>
            </div>
          </div>}
        </>)}
      </div>

      {tab==="heures"&&hasD&&!wd.valide&&<div style={st.fCTA}>
        {lun.getMonth()!==ven.getMonth()&&<button onClick={()=>{setPdfMois({m:lun.getMonth(),y:lun.getFullYear()});setPop(true);}} style={{...st.sec,width:"100%",marginBottom:8,fontSize:12}}>PDF clôture {MOIS[lun.getMonth()]}</button>}
        <button onClick={valider} style={{...st.cta,width:"100%"}}>Valider et envoyer</button>
      </div>}

      {/* Tab bar with active green bg */}
      <div style={st.tabBar}>
        <div style={st.tabIn}>
          {[{id:"heures",l:"Heures"},{id:"absences",l:"Absences"},{id:"historique",l:"Tableau de bord"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{...st.tabB,...(tab===t.id?st.tabA:{})}}>
              {t.id==="heures"&&<IClock color={tab===t.id?P.teal:P.muted} size={20}/>}

              <span style={{fontSize:10,fontWeight:tab===t.id?700:400}}>{t.l}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

<script>
(function(){
  if(!('serviceWorker' in navigator))return;
  navigator.serviceWorker.register('./sw.js').then(function(reg){
    reg.addEventListener('updatefound',function(){var nw=reg.installing;if(!nw)return;nw.addEventListener('statechange',function(){if(nw.state==='installed'&&navigator.serviceWorker.controller){nw.postMessage({type:'SKIP_WAITING'});}});});
  }).catch(function(){});
  navigator.serviceWorker.addEventListener('message',function(e){if(e.data&&e.data.type==='SW_UPDATED')window.location.reload();});
  document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible'&&navigator.serviceWorker.controller){navigator.serviceWorker.ready.then(function(reg){reg.update();});}});
})();
</script>
</body>
</html>
