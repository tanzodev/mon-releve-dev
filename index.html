<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/*
 * ╔═══════════════════════════════════════════════╗
 * ║  MON RELEVÉ — v2.0                            ║
 * ║  Compteur report · PDF simplifié · Nouveautés ║

 */
const VERSION = "2.0";
const CHANGELOG = [
  "Compteur de report d'heures automatique",
  "Report affiché sur le relevé PDF",
  "Envoi simplifié — bouton PDF unique",
  "Popup nouveautés à chaque mise à jour"
];
const REPORT_WEEK_CAP = 180; // ±3h en minutes
const REPORT_GLOBAL_CAP = 360; // ±6h en minutes

// ── Constants ──
const TOAST_MS = 2000, DL_MS = 1000, MS_DAY = 864e5, DEF_OBJ = 35;
const D_PM_H = "10:00", D_PM_F = "10:15", D_PD_D = "12:30", D_PD_F = "13:15";
const JOURS = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi"];
const MOTIFS = ["Congé payé","RTT","Férié","Maladie","Sans solde","Formation","Autre"];
const CONTRATS = ["CDI — 35h","CDI — 39h","CDI — Temps partiel","CDD","CDD — Temps partiel","Apprentissage","Intérim","Autre"];
const H_OBJ = {"CDI — 35h":35,"CDI — 39h":39,"CDI — Temps partiel":28,CDD:35,"CDD — Temps partiel":28,Apprentissage:35,Intérim:35,Autre:35};
const MOIS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const MOIS_C = ["jan.","fév.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
const MOIS_U = ["JANVIER","FÉVRIER","MARS","AVRIL","MAI","JUIN","JUILLET","AOÛT","SEPTEMBRE","OCTOBRE","NOVEMBRE","DÉCEMBRE"];

// ── Palette ──
const P = {

  teal:"#2DD4A8", tealDim:"rgba(45,212,168,.12)", sky:"#38BDF8", blue:"#3B82F6",
  orange:"#FBBF24", red:"#EF4444", text:"#FFFFFF", sub:"rgba(255,255,255,.7)",
  muted:"rgba(255,255,255,.4)", dim:"rgba(255,255,255,.2)", border:"rgba(255,255,255,.08)"
};

// ── Icons ──
const sp={fill:"none",strokeWidth:"1.8",strokeLinecap:"round",strokeLinejoin:"round"};
const IClock=({color=P.muted,size=22})=><svg width={size} height={size} viewBox="0 0 24 24" stroke={color} {...sp}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
const ICalX=({color=P.muted,size=22})=><svg width={size} height={size} viewBox="0 0 24 24" stroke={color} {...sp}><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="10" y1="14" x2="14" y2="18"/><line x1="14" y1="14" x2="10" y2="18"/></svg>;
const IChart=({color=P.muted,size=22})=><svg width={size} height={size} viewBox="0 0 24 24" stroke={color} {...sp}><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>;
const IDoc=({size=16})=><svg width={size} height={size} viewBox="0 0 24 24" stroke={P.muted} {...sp}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>;
const IGear=({size=20})=><svg width={size} height={size} viewBox="0 0 24 24" stroke={P.sub} {...sp}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
const ICheck=({size=14,color=P.teal})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;

// ── Helpers ──
function getSem(d=new Date()){d=new Date(d);d.setHours(0,0,0,0);d.setDate(d.getDate()+3-((d.getDay()+6)%7));const s1=new Date(d.getFullYear(),0,4);return{y:d.getFullYear(),n:1+Math.round(((d-s1)/MS_DAY-3+((s1.getDay()+6)%7))/7)};}
function getLun(d=new Date()){d=new Date(d);const j=d.getDay();d.setDate(d.getDate()-j+(j===0?-6:1));d.setHours(0,0,0,0);return d;}
function getLunCle(c){const[a,s]=[parseInt(c.split("-S")[0]),parseInt(c.split("-S")[1])];const j=new Date(a,0,4);const dj=j.getDay()||7;const l=new Date(j);l.setDate(j.getDate()-dj+1+(s-1)*7);l.setHours(0,0,0,0);return l;}
function cleS(s){return`${s.y}-S${String(s.n).padStart(2,"0")}`;}
function fU(d){return`${d.getDate()} ${MOIS_U[d.getMonth()]}`;}
function fC(d){return`${d.getDate()} ${MOIS_C[d.getMonth()]}`;}
function fF(d){return`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;}
function t2m(t){if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m;}
function m2h(m){if(m<=0)return"0h00";return`${Math.floor(m/60)}h${String(m%60).padStart(2,"0")}`;}
function cNet(a,d,cfg){if(!a||!d)return 0;const am=t2m(a),dm=t2m(d);if(dm<=am)return 0;let b=dm-am;const m1=t2m(cfg.pauseMatinHeure||D_PM_H),m2=t2m(cfg.pauseMatinFin||D_PM_F);if(m2>m1&&am<m2&&dm>m1)b-=(Math.min(dm,m2)-Math.max(am,m1));const p1=t2m(cfg.pauseMidiDebut||D_PD_D),p2=t2m(cfg.pauseMidiFin||D_PD_F);if(p2>p1&&am<p2&&dm>p1)b-=(Math.min(dm,p2)-Math.max(am,p1));return Math.max(0,b);}
function cPause(a,d,cfg){if(!a||!d)return 0;const am=t2m(a),dm=t2m(d);if(dm<=am)return 0;let p=0;const m1=t2m(cfg.pauseMatinHeure||D_PM_H),m2=t2m(cfg.pauseMatinFin||D_PM_F);if(m2>m1&&am<m2&&dm>m1)p+=(Math.min(dm,m2)-Math.max(am,m1));const p1=t2m(cfg.pauseMidiDebut||D_PD_D),p2=t2m(cfg.pauseMidiFin||D_PD_F);if(p2>p1&&am<p2&&dm>p1)p+=(Math.min(dm,p2)-Math.max(am,p1));return p;}
function tIdx(){const d=new Date().getDay();return d>=1&&d<=5?d-1:-1;}
function semOff(o){const d=new Date();d.setDate(d.getDate()+o*7);return{s:getSem(d),l:getLun(d)};}
function salut(){const h=new Date().getHours();return h<12?"Bonjour":h<18?"Bon après-midi":"Bonsoir";}
function hNow(){const d=new Date();return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}

// ── Storage ──
const PX="mr_";
const vide=s=>({cle:cleS(s),valide:false,valideA:null,notes:"",report:null,jours:Array.from({length:5},()=>({arrivee:"",depart:"",absence:false,motif:"",motifAutre:""}))});
function ldSem(c,n){try{const r=localStorage.getItem(`${PX}${n}_${c}`);if(r){const d=JSON.parse(r);return{cle:d.cle||d.key||c,valide:d.valide!==undefined?d.valide:!!d.v,valideA:d.valideA||d.at||null,notes:d.notes||"",report:d.report||null,jours:(d.jours||d.days||[]).map(j=>({arrivee:j.arrivee||j.a||"",depart:j.depart||j.d||"",absence:j.absence!==undefined?j.absence:!!j.abs,motif:j.motif||j.mot||"",motifAutre:j.motifAutre||j.motA||""}))};}}catch(e){console.warn(e);}return null;}
function svSem(c,n,d){try{localStorage.setItem(`${PX}${n}_${c}`,JSON.stringify(d));}catch(e){console.warn(e);}}
function delSem(c,n){try{localStorage.removeItem(`${PX}${n}_${c}`);}catch{}}
function ldCounter(){try{const v=localStorage.getItem(`${PX}report_counter`);return v?parseInt(v):0;}catch{return 0;}}
function svCounter(v){try{localStorage.setItem(`${PX}report_counter`,String(v));}catch{}}
function recalcCounter(n){
  // Recalcule le compteur en rejouant tous les reports validés dans l'ordre chronologique
  const weeks=allSem(n).filter(w=>w.data&&w.data.report).sort((a,b)=>a.cle.localeCompare(b.cle));
  let cnt=0;
  weeks.forEach(w=>{cnt=Math.max(-REPORT_GLOBAL_CAP,Math.min(REPORT_GLOBAL_CAP,cnt+w.data.report.applique));});
  svCounter(cnt);
  return cnt;
}
function ldProf(){try{const r=localStorage.getItem(`${PX}prof`);if(r){const p=JSON.parse(r);const matH=p.pauseMatinHeure||D_PM_H;let matF=p.pauseMatinFin;if(!matF&&p.pauseMatinDuree!==undefined){const mf=t2m(matH)+p.pauseMatinDuree;matF=`${String(Math.floor(mf/60)).padStart(2,"0")}:${String(mf%60).padStart(2,"0")}`;}return{nom:p.nom||p.name||"",contrat:p.contrat||"",entreprise:p.entreprise||p.co||"",pointageRapide:p.pointageRapide!==undefined?p.pointageRapide:(p.quickStamp!==undefined?p.quickStamp:true),pauseMatinHeure:matH,pauseMatinFin:matF||D_PM_F,pauseMidiDebut:p.pauseMidiDebut||D_PD_D,pauseMidiFin:p.pauseMidiFin||D_PD_F};}}catch{}return{nom:"",contrat:"",entreprise:"",pointageRapide:true,pauseMatinHeure:D_PM_H,pauseMatinFin:D_PM_F,pauseMidiDebut:D_PD_D,pauseMidiFin:D_PD_F};}
function svProf(p){try{localStorage.setItem(`${PX}prof`,JSON.stringify(p));}catch{}}
function allSem(n){try{const pfx=`${PX}${n}_`;return Object.keys(localStorage).filter(k=>k.startsWith(pfx)).map(k=>{const c=k.slice(pfx.length);return{cle:c,data:ldSem(c,n)};}).filter(w=>w.data).sort((a,b)=>b.cle.localeCompare(a.cle));}catch{return[];}}
function mStats(n,ct,semNum,cfg){const now=new Date();const mo=now.getMonth(),yr=now.getFullYear();const obj=(H_OBJ[ct]||DEF_OBJ)*60;return allSem(n).filter(({cle})=>{const l=getLunCle(cle);return l.getFullYear()===yr&&l.getMonth()===mo;}).map(({cle,data})=>{const tot=data.jours.reduce((s,j)=>j.absence?s:s+cNet(j.arrivee,j.depart,cfg),0);const abs=data.jours.filter(j=>j.absence);const absMotifs={};abs.forEach(j=>{const m=j.motif==="Autre"?(j.motifAutre||"Autre"):(j.motif||"Non précisé");absMotifs[m]=(absMotifs[m]||0)+1;});const num=parseInt(cle.split("-S")[1]);return{num,tot,obj,diff:tot-obj,v:!!data.valide,cur:num===semNum,absCount:abs.length,absMotifs};}).sort((a,b)=>a.num-b.num);}

// ── Time history (frequent times) ──
function ldHist(){try{const r=localStorage.getItem(`${PX}thist`);return r?JSON.parse(r):[];}catch{return[];}}
function svHist(arr){try{localStorage.setItem(`${PX}thist`,JSON.stringify(arr.slice(0,8)));}catch{}}
function addHist(t){if(!t)return;const arr=ldHist();const idx=arr.findIndex(x=>x.t===t);if(idx>=0){arr[idx].c++;arr[idx].u=Date.now();}else{arr.push({t,c:1,u:Date.now()});}arr.sort((a,b)=>b.c-a.c||b.u-a.u);svHist(arr);}
function getHist(){return ldHist().slice(0,6).map(x=>x.t);}

// ── TimeInput Component ──
function TimeInput({value,onChange,label,noHistory}){
  const[focused,setFocused]=useState(false);
  const[raw,setRaw]=useState("");
  const[err,setErr]=useState(false);
  const inputRef=useRef(null);
  const hist=useMemo(()=>noHistory?[]:getHist(),[focused,noHistory]);
  
  const parseDigits=d=>{
    if(!d)return"";
    let h,m;
    if(d.length<=2){h=parseInt(d);m=0;}
    else if(d.length===3){h=parseInt(d[0]);m=parseInt(d.slice(1));}
    else{h=parseInt(d.slice(0,2));m=parseInt(d.slice(2));}
    if(isNaN(h)||isNaN(m)||h>23||m>59)return null;
    return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
  };
  
  const commit=()=>{
    setFocused(false);setErr(false);
    if(!raw){if(value)onChange("");return;}
    const digits=raw.replace(/\D/g,"");
    const parsed=parseDigits(digits);
    if(parsed===null){setErr(true);setTimeout(()=>setErr(false),TOAST_MS);return;}
    if(parsed){onChange(parsed);if(!noHistory)addHist(parsed);}
  };
  const handleFocus=()=>{setFocused(true);setErr(false);setRaw(value?value.replace(":",""):"");setTimeout(()=>{if(inputRef.current)inputRef.current.select();},50);};
  const handleBlur=()=>commit();
  const handleChange=e=>{setRaw(e.target.value.replace(/\D/g,"").slice(0,4));setErr(false);};
  const handleKeyDown=e=>{if(e.key==="Enter")e.target.blur();};
  const clear=()=>{onChange("");setRaw("");setFocused(false);};
  const pickHist=t=>{onChange(t);if(!noHistory)addHist(t);setRaw(t.replace(":",""));setFocused(false);};
  
  const displayVal=focused?raw:(value||"–:–");
  const hasVal=!!value;
  
  return(
    <div style={{position:"relative"}}>
      {label&&<div style={st.iL}>{label}</div>}
      <div style={{position:"relative",display:"flex",alignItems:"center"}}>
        <input ref={inputRef} type="text" inputMode="numeric" value={displayVal}
          onFocus={handleFocus} onBlur={handleBlur} onChange={handleChange} onKeyDown={handleKeyDown}
          style={{...st.tI,color:hasVal?P.text:P.dim,fontVariantNumeric:"tabular-nums",paddingRight:hasVal&&focused?32:12,...(err?{borderColor:P.red}:{})}}
        />
        {hasVal&&focused&&<button onMouseDown={e=>{e.preventDefault();clear();}} style={st.clrBtn} aria-label="Effacer">✕</button>}
      </div>
      {err&&<div style={{fontSize:10,color:P.red,marginTop:3}}>Heure invalide</div>}
      {focused&&hist.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
          {hist.map(t=><button key={t} onMouseDown={e=>{e.preventDefault();pickHist(t);}} style={st.chip}>{t}</button>)}
        </div>
      )}
    </div>
  );
}

// ── Main App ──
window.MonReleve=function MonReleve(){
  const[pr,setPr]=useState(ldProf);
  const[ok,setOk]=useState(()=>{const p=ldProf();return!!(p.nom&&p.entreprise);});
  const[ed,setEd]=useState(false);
  const[off,setOff]=useState(0);
  const[wd,setWd]=useState(null);
  const[tab,setTab]=useState("heures");
  const[msg,setMsg]=useState("");
  const[pop,setPop]=useState(false);
  const[arch,setArch]=useState(null);
  const[cfDel,setCfDel]=useState(false);
  const[cfUnlock,setCfUnlock]=useState(false);
  const[rk,setRk]=useState(0);
  const[peOpen,setPeOpen]=useState(false);
  const[notesOpen,setNotesOpen]=useState(false);
  const[showNews,setShowNews]=useState(()=>{try{return localStorage.getItem(`${PX}last_ver`)!==VERSION;}catch{return false;}});
  const[showChangelog,setShowChangelog]=useState(false);
  const[guideOpen,setGuideOpen]=useState(false);
  const[lastBackup,setLastBackup]=useState(()=>{try{return localStorage.getItem(`${PX}last_backup`)||null;}catch{return null;}});

  const{s:sem,l:lun}=semOff(off);
  const ck=cleS(sem),ven=new Date(lun.getTime()+4*MS_DAY),cur=off===0,ti=tIdx();
  const objM=(H_OBJ[pr.contrat]||DEF_OBJ)*60;
  const isWeekend=ti<0&&cur;

  useEffect(()=>{if(ok&&pr.nom)setWd(ldSem(ck,pr.nom)||vide(sem));},[ck,pr.nom,ok,rk,sem.n,sem.y]);

  const sv=useCallback(d=>{setWd(d);svSem(ck,pr.nom,d);},[ck,pr.nom]);
  const toastRef=useRef(null);
  const flash=m=>{setMsg(m);if(toastRef.current)clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setMsg(""),TOAST_MS);};
  useEffect(()=>()=>{if(toastRef.current)clearTimeout(toastRef.current);},[]);
  const mj=(i,f,v)=>{if(!wd)return;const nj=wd.jours.map((j,k)=>{if(k!==i)return j;const u={...j,[f]:v};if(f==="absence"&&!v){u.motif="";u.motifAutre="";}return u;});sv({...wd,jours:nj});};
  const pointer=(i,f)=>{mj(i,f,hNow());flash(`${f==="arrivee"?"Arrivée":"Départ"} ${hNow()}`);};
  const valider=()=>{
    if(!wd)return;
    const avant=ldCounter();
    const ecart=totMin-objM;
    const reportable=Math.max(-REPORT_WEEK_CAP,Math.min(REPORT_WEEK_CAP,ecart));
    const apres=Math.max(-REPORT_GLOBAL_CAP,Math.min(REPORT_GLOBAL_CAP,avant+reportable));
    const applique=apres-avant;
    const report={avant,ecart,applique,apres};
    svCounter(apres);
    sv({...wd,valide:true,valideA:new Date().toISOString(),report});
    setPop(true);flash("Semaine validée ✓");
  };
  const deverrouiller=()=>{
    if(!wd||!wd.valide)return;
    // Annuler le report de cette semaine dans le compteur
    if(wd.report){const cnt=ldCounter();svCounter(cnt-wd.report.applique);}
    sv({...wd,valide:false,valideA:null,report:null});
    flash("Relevé déverrouillé");
  };
  const setNotes=v=>{if(!wd)return;sv({...wd,notes:v});};

  const totMin=wd?wd.jours.reduce((s,j)=>j.absence?s:s+cNet(j.arrivee,j.depart,pr),0):0;
  const hasD=wd&&wd.jours.some(j=>j.arrivee||j.depart||j.absence);
  const pct=Math.min(100,Math.round(totMin/objM*100));
  const prenom=(pr.nom||"").split(" ")[0]||pr.nom;

  const restaurer=()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json,application/json";inp.style.cssText="position:fixed;top:-9999px;left:-9999px;opacity:0";document.body.appendChild(inp);inp.onchange=e=>{const f=e.target.files[0];if(!f){document.body.removeChild(inp);return;}const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d||typeof d!=="object"||!d.profile||typeof d.profile!=="object"||!Array.isArray(d.weeks))throw new Error("!");const pn=d.profile.nom||d.profile.name;if(!pn||typeof pn!=="string"||!pn.trim())throw new Error("!");const p={nom:pn.trim(),contrat:d.profile.contrat||"",entreprise:(d.profile.entreprise||d.profile.co||"").trim(),pointageRapide:d.profile.pointageRapide!==undefined?d.profile.pointageRapide:true,pauseMatinHeure:d.profile.pauseMatinHeure||D_PM_H,pauseMatinFin:d.profile.pauseMatinFin||D_PM_F,pauseMidiDebut:d.profile.pauseMidiDebut||D_PD_D,pauseMidiFin:d.profile.pauseMidiFin||D_PD_F};svProf(p);let imported=0;d.weeks.forEach(w=>{if(!w||typeof w!=="object")return;const c=w.cle||w.key;if(!c||typeof c!=="string"||!w.data)return;svSem(c,p.nom,w.data);imported++;});setPr(p);setOk(true);setRk(x=>x+1);recalcCounter(p.nom);flash(`Restauré ✓ (${imported} sem.)`)}catch{flash("Fichier invalide");}document.body.removeChild(inp);};r.onerror=()=>{flash("Erreur de lecture");document.body.removeChild(inp);};r.readAsText(f);};setTimeout(()=>inp.click(),100);};

      {/* Summary compact */}
      <div style={{padding:"8px 16px 0"}}>
        <div style={{...GL,borderRadius:24,padding:"18px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <div>
              <div style={{fontSize:10,color:P.sub,fontWeight:500,textTransform:"uppercase",letterSpacing:.5}}>Temps déclaré</div>
              <div style={{fontSize:34,fontWeight:800,color:P.text,letterSpacing:-2,marginTop:2}}>{m2h(totMin)}</div>
            </div>
            <div style={{textAlign:"right",marginBottom:4}}>
              <div style={{fontSize:13,color:P.muted}}>sur {H_OBJ[pr.contrat]||DEF_OBJ}h</div>
              <div style={{fontSize:11,color:P.sub}}>prévues</div>
            </div>
          </div>
          <div style={{marginTop:8,height:5,borderRadius:3,background:P.card,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:3,background:pct>=100?P.teal:P.blue,width:`${pct}%`,transition:"width .4s"}}/>
          </div>
          <div style={{marginTop:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              {isWeekend&&weekStatus?(<><div style={{width:7,height:7,borderRadius:4,background:wd.valide?P.teal:P.blue}}/><span style={{fontSize:11,fontWeight:600,color:wd.valide?P.teal:P.blue}}>{weekStatus}</span></>)
              :wd.valide?(<><div style={{width:7,height:7,borderRadius:4,background:P.teal}}/><span style={{fontSize:11,fontWeight:600,color:P.teal}}>Envoyé</span></>)
              :(<><div style={{width:7,height:7,borderRadius:4,background:P.orange}}/><span style={{fontSize:11,fontWeight:600,color:P.orange}}>Non envoyé</span></>)}
            </div>
            {(()=>{const jc=wd.jours.filter(j=>!j.absence&&(j.arrivee||j.depart)).length;return<span style={{fontSize:10,color:P.muted}}>{jc} jour{jc>1?"s":""} saisis</span>;})()}
          </div>
        </div>
      </div>

      <div style={st.body}>
        {/* ── TAB HEURES ── */}
        {tab==="heures"&&(<>
          {wd.valide&&<div style={{...GL,borderRadius:16,padding:"12px 16px",marginBottom:10}}>
            {!cfUnlock?
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:12,fontWeight:600,color:P.teal}}>✓ Semaine validée</div><div style={{fontSize:10,color:P.sub,marginTop:2}}>Relevé figé — modification impossible</div></div>
                <button onClick={()=>setCfUnlock(true)} style={{...st.sec,fontSize:11,padding:"8px 14px"}}>Modifier</button>
              </div>
            :
              <div>
                <div style={{fontSize:12,fontWeight:600,color:P.orange,textAlign:"center",marginBottom:8}}>Déverrouiller ce relevé ?</div>
                <div style={{fontSize:11,color:P.sub,textAlign:"center",marginBottom:12}}>Le report de cette semaine sera annulé du compteur. Une nouvelle validation sera nécessaire.</div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setCfUnlock(false)} style={{...st.sec,flex:1}}>Annuler</button>
                  <button onClick={()=>{deverrouiller();setCfUnlock(false);}} style={{...st.sec,flex:1,background:P.orange,color:P.bg}}>Déverrouiller</button>
                </div>
              </div>
            }
          </div>}
          {dayOrder.map(i=>{
            const j=wd.jours[i];
            if(j.absence)return<div key={i} style={{...st.dc,...(wd.valide?{opacity:.7}:{})}}><div style={st.dRow}><span style={st.dN}>{JOURS[i]}</span><span style={st.absP}>{j.motif==="Autre"?(j.motifAutre||"Absence"):j.motif}</span></div></div>;
            const n=cNet(j.arrivee,j.depart,pr);const isT=cur&&i===ti&&!isWeekend;const ok2=j.arrivee&&j.depart;
            return(<div key={i} style={{...st.dc,...(isT&&!wd.valide?{border:`1.5px solid ${P.teal}`,boxShadow:`0 0 16px ${P.teal}15`}:{}),...(wd.valide?{opacity:.7}:{})}}>
              <div style={st.dRow}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={st.dN}>{JOURS[i]}</span>
                  {isT&&!wd.valide&&<span style={{fontSize:8,fontWeight:700,color:P.teal,background:P.tealDim,padding:"2px 7px",borderRadius:8}}>Aujourd'hui</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {isT&&showQ&&!wd.valide&&!j.arrivee&&<button onClick={()=>pointer(i,"arrivee")} style={st.punchBtn}>↓</button>}
                  {isT&&showQ&&!wd.valide&&j.arrivee&&!j.depart&&<button onClick={()=>pointer(i,"depart")} style={{...st.punchBtn,borderColor:`${P.blue}40`}}>↑</button>}
                  {ok2&&<span style={st.netP}>{m2h(n)}</span>}
                </div>
              </div>
              {wd.valide?
                <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:6,alignItems:"center",marginTop:6}}>
                  <div style={{textAlign:"center",padding:"10px 12px",fontSize:15,fontWeight:600,color:P.sub}}>{j.arrivee||"–:–"}</div>
                  <div style={{color:P.dim,fontSize:12}}>→</div>
                  <div style={{textAlign:"center",padding:"10px 12px",fontSize:15,fontWeight:600,color:P.sub}}>{j.depart||"–:–"}</div>
                </div>
              :
                <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:6,alignItems:"start",marginTop:6}}>
                  <TimeInput value={j.arrivee} onChange={v=>mj(i,"arrivee",v)} label="Arrivée"/>
                  <div style={{color:P.dim,marginTop:22,fontSize:12}}>→</div>
                  <TimeInput value={j.depart} onChange={v=>mj(i,"depart",v)} label="Départ"/>
                </div>
              }
              {ok2&&<div style={{fontSize:11,color:P.sub,marginTop:4}}>Pause {m2h(cPause(j.arrivee,j.depart,pr))} · Net {m2h(n)}</div>}
            </div>);
          })}
          <div style={{fontSize:11,color:P.muted,textAlign:"center",marginTop:4,marginBottom:4}}>Pauses : {pr.pauseMatinHeure||D_PM_H}–{pr.pauseMatinFin||D_PM_F} + {pr.pauseMidiDebut||D_PD_D}–{pr.pauseMidiFin||D_PD_F}</div>
          {/* Notes de semaine — accordéon */}
          <div style={{marginTop:4,marginBottom:70}}>
            <div style={{...GL,borderRadius:16,padding:"10px 14px"}}>
              <button onClick={()=>setNotesOpen(!notesOpen)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",padding:0}}>
                <div style={{fontSize:11,fontWeight:600,color:P.sub}}>Notes de semaine {wd.notes?<span style={{color:P.teal,fontSize:9,marginLeft:4}}>●</span>:null}</div>
                <span style={{color:P.sub,fontSize:14,transform:notesOpen?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
              </button>
              {notesOpen&&<textarea value={wd.notes||""} onChange={e=>setNotes(e.target.value)} placeholder="Salon, événement, déplacement, réunion client…" rows={2} style={{width:"100%",background:"none",border:"none",color:P.text,fontSize:12,resize:"vertical",outline:"none",lineHeight:1.5,fontFamily:"inherit",marginTop:8}}/>}
            </div>
          </div>
        </>)}

        {/* ── TAB ABSENCES ── */}
        {tab==="absences"&&(<>
          <p style={{fontSize:12,color:P.sub,marginBottom:12}}>Sélectionnez les jours d'absence.</p>
          {wd.jours.map((j,i)=>(<div key={i} style={{...st.dc,padding:"12px 14px"}}>
            <label style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
              <input type="checkbox" checked={j.absence} onChange={e=>mj(i,"absence",e.target.checked)} style={{width:20,height:20,accentColor:P.teal,flexShrink:0}}/>
              <span style={{fontWeight:600,fontSize:14,color:P.text}}>{JOURS[i]}</span>
            </label>
            {j.absence&&(<div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${P.border}`}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>{MOTIFS.map(m=><button key={m} onClick={()=>mj(i,"motif",m)} style={{...st.mP,...(j.motif===m?{background:P.teal,color:P.bg}:{})}}>{m}</button>)}</div>
              {j.motif==="Autre"&&<input type="text" placeholder="Précisez…" value={j.motifAutre} onChange={e=>mj(i,"motifAutre",e.target.value)} style={{...st.fi,marginTop:8,padding:"10px 14px",fontSize:13}}/>}
            </div>)}
          </div>))}
        </>)}

        {/* ── TAB HISTORIQUE ── */}
        {tab==="historique"&&(<>
          {/* Compteur de report */}
          {(()=>{const cnt=ldCounter();return cnt!==0?(
            <div style={{...GL,borderRadius:20,padding:"14px 18px",marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:11,color:P.sub,textTransform:"uppercase",letterSpacing:.5}}>Compteur de report</div></div>
                <div style={{fontSize:22,fontWeight:800,color:cnt>0?P.teal:P.orange}}>{cnt>0?"+":cnt<0?"−":""}{m2h(Math.abs(cnt))}</div>
              </div>
              <div style={{marginTop:6,height:4,borderRadius:2,background:P.card,overflow:"hidden",position:"relative"}}>
                <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:1,background:P.dim}}/>
                <div style={{height:"100%",borderRadius:2,background:cnt>0?P.teal:P.orange,width:`${Math.min(100,Math.abs(cnt)/REPORT_GLOBAL_CAP*50)}%`,marginLeft:cnt>=0?"50%":"auto",marginRight:cnt<0?"50%":"auto",transition:"width .4s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}><span style={{fontSize:9,color:P.muted}}>-{m2h(REPORT_GLOBAL_CAP)}</span><span style={{fontSize:9,color:P.dim}}>0</span><span style={{fontSize:9,color:P.muted}}>+{m2h(REPORT_GLOBAL_CAP)}</span></div>
            </div>
          ):null;})()}
          <div style={{fontSize:16,fontWeight:700,color:P.text,marginBottom:3}}>{MOIS[new Date().getMonth()]}</div>
          <div style={{fontSize:12,color:P.sub,marginBottom:10}}>Synthèse mensuelle</div>
          <div style={{...GL,borderRadius:24,padding:"18px 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
              <div><div style={{fontSize:10,color:P.sub,textTransform:"uppercase",letterSpacing:.5}}>Cumulé</div><div style={{fontSize:28,fontWeight:800,color:P.text,marginTop:2,letterSpacing:-1}}>{m2h(mTot)}</div></div>
              <div style={{textAlign:"right",marginBottom:2}}><div style={{fontSize:13,color:P.muted}}>sur {m2h(mObj)}</div><div style={{fontSize:10,color:P.sub,marginTop:1}}>{stats.length} sem.</div></div>
            </div>
            <div style={{marginTop:10,height:6,borderRadius:3,background:"rgba(255,255,255,.06)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,background:mPct>=100?P.teal:P.blue,width:`${mPct}%`,transition:"width .4s ease"}}/></div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><span style={{fontSize:10,color:P.muted}}>{mPct}%</span><span style={{fontSize:10,color:P.muted}}>{m2h(mObj)}</span></div>
            {stats.length>0&&(<div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:12,background:mDiff>0?P.tealDim:mDiff<0?"rgba(251,191,36,.08)":"rgba(59,130,246,.08)",marginTop:8}}>
              <div style={{width:7,height:7,borderRadius:4,background:mDiff>0?P.teal:mDiff<0?P.orange:P.blue}}/>
              <span style={{fontSize:12,fontWeight:600,color:mDiff>0?P.teal:mDiff<0?P.orange:P.blue}}>{mDiff>0?`+${m2h(mDiff)} heures sup.`:mDiff<0?`${m2h(Math.abs(mDiff))} restantes`:"Objectif atteint"}</span>
            </div>)}
            {mAbsTotal>0&&(<div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${P.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:12,fontWeight:600,color:P.text}}>Absences</span><span style={{fontSize:12,fontWeight:700,color:P.orange}}>{mAbsTotal}j</span></div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{mAbsDetail.map(([motif,count])=>(<div key={motif} style={{display:"flex",alignItems:"center",gap:4,background:"rgba(251,191,36,.06)",padding:"4px 10px",borderRadius:999,border:`1px solid rgba(251,191,36,.12)`}}><span style={{fontSize:11,fontWeight:600,color:P.orange}}>{count}</span><span style={{fontSize:11,color:P.sub}}>{motif}</span></div>))}</div>
            </div>)}
          </div>
          {stats.length>0&&<div style={{...GL,borderRadius:24,padding:"14px 18px",marginTop:10}}><div style={{fontSize:12,fontWeight:600,color:P.text,marginBottom:10}}>Heures par semaine</div><Chart/></div>}
          <div style={{marginTop:12,fontSize:14,fontWeight:700,color:P.text,marginBottom:8}}>Tous les relevés</div>
          {archList.length===0&&<div style={{color:P.muted,fontSize:13,padding:30,textAlign:"center"}}>Aucun relevé</div>}
          {archList.map(({cle:c,data:d})=>{
            const wt=d.jours.reduce((s,j)=>j.absence?s:s+cNet(j.arrivee,j.depart,pr),0);
            const al=getLunCle(c);const av=new Date(al.getTime()+4*MS_DAY);
            return(<button key={c} onClick={()=>setArch({cle:c,data:d})} style={st.archI}>
              <div style={{flex:1}}>
                <div style={{fontSize:20,fontWeight:800,color:P.text}}>{m2h(wt)}</div>
                <div style={{fontSize:12,color:P.sub,marginTop:1}}>{fC(al)} – {fC(av)}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>{d.valide&&<ICheck size={12}/>}<span style={{fontSize:10,fontWeight:600,color:P.teal,letterSpacing:.5}}>S{parseInt(c.split("-S")[1])}</span><span style={{color:P.dim,fontSize:18}}>›</span></div>
            </button>);
          })}
          {/* Guide d'utilisation */}
          <div style={{marginTop:12}}>
            <div style={{...GL,borderRadius:24,padding:"14px 18px"}}>
              <button onClick={()=>setGuideOpen(!guideOpen)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",padding:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:16}}>📋</span>
                  <span style={{fontSize:14,fontWeight:700,color:P.text}}>Guide d'utilisation</span>
                </div>
                <span style={{color:P.sub,fontSize:14,transform:guideOpen?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
              </button>
              {guideOpen&&<div style={{marginTop:14,fontSize:12,color:P.sub,lineHeight:1.7}}>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>1. Saisie quotidienne</div>
                <div style={{marginBottom:10}}>Remplir ses heures chaque jour de travail. Les pauses sont déduites automatiquement selon les paramètres définis.</div>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>2. Absences</div>
                <div style={{marginBottom:10}}>Déclarer chaque jour d'absence avec le motif correspondant. Un jour déclaré absent n'est pas comptabilisé dans le total horaire.</div>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>3. Validation et valeur légale</div>
                <div style={{marginBottom:10}}>Valider la semaine une seule fois, quand les 5 jours sont complets et vérifiés. La validation fige le relevé et calcule le compteur de report. <strong style={{color:P.orange}}>Seul le relevé validé et transmis à l'employeur fait foi. Toute modification effectuée après validation et envoi ne pourra être prise en compte.</strong></div>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>4. Correction exceptionnelle</div>
                <div style={{marginBottom:10}}>En cas d'erreur constatée avant envoi, un relevé validé peut être déverrouillé pour correction. Le déverrouillage annule le report de cette semaine dans le compteur. La correction doit être suivie d'une nouvelle validation et d'un nouvel envoi.</div>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>5. Compteur de report</div>
                <div style={{marginBottom:10}}>L'écart entre les heures réalisées et le contrat est reporté automatiquement, dans la limite de ±3h par semaine et ±6h au total. Le compteur est visible dans le tableau de bord et sur chaque relevé PDF.</div>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>6. Export PDF</div>
                <div style={{marginBottom:10}}>Après validation, exporter le relevé en PDF et l'envoyer par mail ou AirDrop. Le PDF fait foi.</div>
                <div style={{fontWeight:700,color:P.text,marginBottom:4}}>7. Sauvegardes</div>
                <div>Effectuer une sauvegarde au minimum une fois par mois depuis le tableau de bord. Conserver le fichier dans iCloud Drive (iPhone) ou Google Drive (Android). En cas de changement de téléphone, restaurer la sauvegarde depuis l'écran d'accueil.</div>
              </div>}
            </div>
          </div>
          {/* Sécurité des données */}
          <div style={{marginTop:20}}>
            <div style={{...GL,borderRadius:24,padding:"18px 20px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={P.teal} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <span style={{fontSize:14,fontWeight:700,color:P.text}}>Sécurité des données</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",borderRadius:12,background:lastBackup?P.tealDim:"rgba(251,191,36,.08)",marginBottom:12}}>
                <div style={{width:7,height:7,borderRadius:4,background:lastBackup?P.teal:P.orange}}/>
                <div>
                  <div style={{fontSize:11,fontWeight:600,color:lastBackup?P.teal:P.orange}}>{lastBackup?"Dernière sauvegarde":"Aucune sauvegarde"}</div>
                  {lastBackup&&<div style={{fontSize:10,color:P.sub,marginTop:1}}>{new Date(lastBackup).toLocaleDateString("fr-FR")} à {new Date(lastBackup).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</div>}
                </div>
              </div>
              <button onClick={exporter} style={{...st.cta,width:"100%",height:44,fontSize:13,marginBottom:8}}>Sauvegarder</button>
              <button onClick={restaurer} style={{...st.sec,width:"100%",fontSize:12,padding:"10px 16px"}}>Restaurer</button>
              <div style={{fontSize:10,color:P.muted,lineHeight:1.5,textAlign:"center",marginTop:8}}>{/iPhone|iPad|iPod/.test(navigator.userAgent)?"Conservez votre sauvegarde dans iCloud Drive.":/Android/.test(navigator.userAgent)?"Conservez votre sauvegarde dans Google Drive.":"Conservez dans iCloud Drive ou Google Drive."}</div>
            </div>
          </div>
        </>)}
      </div>

      {tab==="heures"&&hasD&&!wd.valide&&<div style={st.fCTA}><button onClick={valider} style={{...st.cta,width:"100%"}}>Valider et envoyer</button></div>}

      {/* Tab bar with active green bg */}
      <div style={st.tabBar}>
        <div style={st.tabIn}>
          {[{id:"heures",l:"Heures"},{id:"absences",l:"Absences"},{id:"historique",l:"Tableau de bord"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{...st.tabB,...(tab===t.id?st.tabA:{})}}>
              {t.id==="heures"&&<IClock color={tab===t.id?P.teal:P.muted} size={20}/>}
              {t.id==="absences"&&<ICalX color={tab===t.id?P.teal:P.muted} size={20}/>}
              {t.id==="historique"&&<IChart color={tab===t.id?P.teal:P.muted} size={20}/>}
              <span style={{fontSize:10,fontWeight:tab===t.id?700:400}}>{t.l}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

const st={
  app:{fontFamily:"-apple-system,'SF Pro Display','Inter',sans-serif",background:P.bgGrad,minHeight:"100vh",maxWidth:520,margin:"0 auto",position:"relative",WebkitFontSmoothing:"antialiased",paddingBottom:90,color:P.text},

  fi:{width:"100%",padding:"12px 14px",fontSize:14,border:`1px solid ${P.border}`,borderRadius:14,outline:"none",background:"rgba(255,255,255,.04)",color:P.text,boxSizing:"border-box",transition:TR},
  fs:{width:"100%",padding:"12px 14px",fontSize:14,border:`1px solid ${P.border}`,borderRadius:14,outline:"none",background:"rgba(255,255,255,.04)",color:P.text,boxSizing:"border-box",transition:TR},
  header:{background:"linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03))",backdropFilter:P.glassBlur,WebkitBackdropFilter:P.glassBlur,borderBottom:`1px solid ${P.glassBorder}`,padding:"14px 18px 12px"},
  gearBtn:{width:38,height:38,borderRadius:12,background:"rgba(255,255,255,.06)",border:`1px solid ${P.glassBorder}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:TR},
  wRow:{display:"flex",alignItems:"center",gap:6},
  wA:{width:32,height:32,borderRadius:10,background:"none",border:"none",color:P.sub,fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:TR},
  offW:{width:"100%",marginTop:10,padding:"10px 14px",borderRadius:16,border:"none",background:"rgba(251,191,36,.07)",color:P.orange,fontSize:12,fontWeight:600,cursor:"pointer",textAlign:"center",transition:TR},
  body:{padding:"12px 16px",paddingBottom:0},
